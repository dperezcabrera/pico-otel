[tox]
env_list = cov, py311, py312, py313, py314
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=8
    pytest-asyncio
    pico-boot
    pico-fastapi
    httpx
    opentelemetry-instrumentation-fastapi
    opentelemetry-exporter-prometheus
commands = pytest {posargs:tests}

[testenv:cov]
deps =
    {[testenv]deps}
    pytest-cov>=5
commands = pytest --cov=pico_otel --cov-report=term-missing tests
